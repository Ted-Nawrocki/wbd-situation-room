name: Update market quotes (WBD, NFLX, PSKY)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * 1-5"  # every 30 min, Mon-Fri (UTC)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch quotes from Finnhub and write JSON
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${FINNHUB_API_KEY:-}" ]; then
            echo "ERROR: FINNHUB_API_KEY secret is not set."
            exit 1
          fi

          mkdir -p assets/data

          fetch_one () {
            SYMBOL="$1"
            OUTFILE="$2"

            # Finnhub /quote returns JSON, not CSV. Write the raw body to a
            # temp file and let Python validate it before anything is saved.
            HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/q.json \
              "https://finnhub.io/api/v1/quote?symbol=${SYMBOL}&token=${FINNHUB_API_KEY}")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERROR: Finnhub returned HTTP $HTTP_CODE for $SYMBOL"
              return 1
            fi

            SYMBOL="$SYMBOL" OUTFILE="$OUTFILE" python3 - <<'PY'
          import json, datetime, os
          from pathlib import Path

          symbol = os.environ["SYMBOL"]
          outfile = os.environ["OUTFILE"]

          raw = Path("/tmp/q.json").read_text().strip()

          # 1. Must be valid JSON.
          try:
              q = json.loads(raw)
          except Exception as e:
              raise SystemExit(f"ERROR: response for {symbol} is not valid JSON: {e}")

          # 2. Must be a JSON object, not a list or string.
          if not isinstance(q, dict):
              raise SystemExit(f"ERROR: response for {symbol} is not a JSON object")

          # 3. Required numeric fields from Finnhub /quote:
          #    c=current, o=open, h=high, l=low, pc=previous close, t=timestamp
          required = ["c", "o", "h", "l", "pc", "t"]
          missing = [k for k in required if k not in q]
          if missing:
              raise SystemExit(f"ERROR: response for {symbol} missing fields: {missing}")

          # 4. Every price field must be a real number, and current price
          #    must be > 0. Finnhub returns c=0 for unknown/invalid symbols.
          def num(key):
              v = q[key]
              if isinstance(v, bool) or not isinstance(v, (int, float)):
                  raise SystemExit(f"ERROR: field {key} for {symbol} is not numeric: {v!r}")
              return float(v)

          current = num("c")
          openp   = num("o")
          high    = num("h")
          low     = num("l")
          prevcl  = num("pc")
          ts      = q["t"]

          if current <= 0:
              raise SystemExit(f"ERROR: current price for {symbol} is {current} (likely invalid symbol or no data)")

          if not isinstance(ts, (int, float)) or ts <= 0:
              raise SystemExit(f"ERROR: timestamp for {symbol} is invalid: {ts!r}")

          # 5. Sanity bounds. A legitimate equity quote will not be absurd.
          for label, val in [("current", current), ("open", openp), ("high", high), ("low", low), ("prevclose", prevcl)]:
              if val < 0 or val > 1_000_000:
                  raise SystemExit(f"ERROR: {label} for {symbol} out of plausible range: {val}")

          # Build the market datetime from the Finnhub epoch timestamp (UTC).
          dt = datetime.datetime.fromtimestamp(ts, tz=datetime.timezone.utc)

          data = {
              "symbol": symbol.upper(),
              "date": dt.strftime("%Y-%m-%d"),
              "time": dt.strftime("%H:%M:%S"),
              "open": f"{openp:.4f}",
              "high": f"{high:.4f}",
              "low": f"{low:.4f}",
              "close": f"{current:.4f}",
              "volume": "",  # Finnhub /quote does not return volume
              "asof_utc": datetime.datetime.now(datetime.timezone.utc).isoformat(timespec="seconds").replace("+00:00", "Z"),
              "source": "finnhub"
          }

          Path(outfile).write_text(json.dumps(data, indent=2) + "\n")
          print(f"Wrote {outfile}: close={data['close']} ({data['date']} {data['time']} UTC)")
          PY
          }

          fetch_one "WBD"  "assets/data/wbd.json"
          fetch_one "NFLX" "assets/data/nflx.json"
          fetch_one "PSKY" "assets/data/psky.json"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/wbd.json assets/data/nflx.json assets/data/psky.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update market quotes"
          git push
